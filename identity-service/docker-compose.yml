services:
  identity-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: n3-identity-db
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - identitydb_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P Your_password123 -C -Q 'SELECT 1' || exit 1"]
      interval: 10s
      retries: 10
      start_period: 30s

  identity-report-service:
    build: ./backend/IdentityReportService
    container_name: n3-identity-report-service
    depends_on:
      identity-db:
        condition: service_healthy
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=identity-db,1433;Database=IdentityDB;User Id=sa;Password=Your_password123;TrustServerCertificate=True"
      Jwt__Key: "Nhom3_IdentityReportService_Secret_Key_2026_AtLeast32Chars"
      Jwt__Issuer: "Nhom3.IdentityReport"
      Jwt__Audience: "DigitalLibrary"
    ports:
      - "5003:8080"

  frontend:
    build: ./frontend
    container_name: n3-frontend
    depends_on:
      - identity-report-service
    ports:
      - "5173:80"

volumes:
  identitydb_data:
